<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Montserrat&family=Roboto&family=Bitcount+Grid+Double&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.min.css">
    
    <title>Jeopardy!</title>

  </head>
  <body>
    <div class="heading">
      <h1>Jeopardy!</h1>
      <div class="game-buttons">
        <button id="play">
          <!-- When the game ends, update the text. -->
          Start the Game!
        </button>
        <button id="reset-button">Reset Game</button>
      </div>
    </div>

    <section>
      <table>
        <thead>
          <tr id="categories">
            <!-- For each category, append a th element here. -->
          </tr>
        </thead>
        <tbody id="clues-body">
          <tr id="clues">
            <!-- For each category, append a td elements here. -->
            <!-- For each clue in a category, append a tr element to the corresponding td. -->
          </tr>
        </tbody>
      </table>

      <div id="active-clue" class="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <!-- When a clue is clicked, show the question here. -->
        <!-- When a question is clicked, show the answer here. -->
        <!-- When the game ends, show it here. -->
         <div class="modal" id="modal">
          <h2 id="modal-title"></h2>
          <p id="display-qa"></p>
          <div class="modal-actions">
            <button class="btn-cancel" id="cancelBtn">Cancel</button>
            <button class="btn-confirm" id="confirmBtn">Reveal Answer</button>
          </div>
         </div>
      </div>
    </section>

    <div id="spinner" class="disabled">
      <i class="fa fa-spin fa-spinner"></i>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/jquery"></script>
    <script src="https://unpkg.com/axios/dist/axios.js"></script>
    <script src="https://unpkg.com/lodash"></script>
    <script src="jeopardy.js"></script>
  </body>
</html>
